<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="../support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="stylesheet" href="../_ds/skytek-design-system-fda4f434-27a8-4d78-8fa7-92ccd315175d/styles.css">
<script src="../_ds/skytek-design-system-fda4f434-27a8-4d78-8fa7-92ccd315175d/_ds_bundle.js"></script>
<style>
  html, body { margin:0; padding:0; }
  body { background: var(--bg-canvas); font-family: var(--font-sans); }
  @keyframes l2-fade-in { from { opacity:0; } to { opacity:1; } }
  @keyframes l2-pop-in { from { opacity:0; transform: translateY(8px) scale(.98); } to { opacity:1; transform: translateY(0) scale(1); } }
  @keyframes l2-snack-in { from { opacity:0; transform: translateY(-14px); } to { opacity:1; transform: translateY(0); } }
  .l2-input { font-family:var(--font-sans); font-size:14px; color:var(--text-primary); background:var(--slate-50); border:1px solid var(--border-default); border-radius:var(--radius-md); padding:0 14px; height:46px; width:100%; box-sizing:border-box; }
  .l2-input::placeholder { color:var(--text-muted); }
  .l2-input:hover { border-color:var(--border-strong); }
  .l2-input:focus { outline:0; border-color:var(--brand-400); box-shadow:var(--shadow-focus); }
  .l2-textarea { font-family:var(--font-sans); font-size:14px; color:var(--text-primary); background:var(--slate-50); border:1px solid var(--border-default); border-radius:var(--radius-md); padding:11px 14px; width:100%; min-height:84px; resize:vertical; box-sizing:border-box; }
  .l2-textarea::placeholder { color:var(--text-muted); }
  .l2-textarea:hover { border-color:var(--border-strong); }
  .l2-textarea:focus { outline:0; border-color:var(--brand-400); box-shadow:var(--shadow-focus); }
  .l2-label { font-size:13px; font-weight:700; color:var(--text-primary); margin-bottom:7px; display:block; }
</style>
</helmet>
<div style="min-height:100vh; position:relative; background:var(--bg-canvas);">

  <!-- preview trigger when modal is closed -->
  <sc-if value="{{ closed }}" hint-placeholder-val="{{ false }}">
    <div style="display:grid; place-items:center; min-height:100vh;">
      <button type="button" onClick="{{ open }}" class="ds-btn ds-btn--primary ds-btn--lg" style="padding:0 22px;">Order a Level 2 Report</button>
    </div>
  </sc-if>

  <!-- ===== Modal ===== -->
  <sc-if value="{{ isOpen }}" hint-placeholder-val="{{ true }}">
  <div style="position:fixed; inset:0; z-index:100; display:grid; place-items:center; padding:24px;">
    <div onClick="{{ close }}" style="position:absolute; inset:0; background:rgba(15,23,42,.5); animation:l2-fade-in .18s ease;"></div>
    <div role="dialog" aria-modal="true" aria-label="Level 2 Report Request" style="position:relative; z-index:1; width:min(94vw,440px); background:var(--bg-surface); border:1px solid var(--border-default); border-radius:var(--radius-xl); box-shadow:var(--card-shadow-raised); padding:24px 28px 26px; animation:l2-pop-in .2s cubic-bezier(0.16,1,0.3,1);">

      <div style="display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:18px;">
        <h2 style="margin:0; font-family:var(--font-display); font-size:20px; font-weight:600; color:var(--text-primary);">Level 2 Report Request</h2>
        <button type="button" onClick="{{ close }}" aria-label="Close" style="width:30px; height:30px; display:inline-grid; place-items:center; background:transparent; border:0; border-radius:var(--radius-md); color:var(--text-muted); cursor:pointer; flex-shrink:0;" style-hover="background:var(--slate-100); color:var(--text-primary);">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"></path></svg>
        </button>
      </div>

      <p style="margin:0 0 20px; text-align:center; font-size:14px; color:var(--text-secondary); line-height:1.55;">Hi <strong style="color:var(--text-primary);">{{ userName }}</strong><br>You are about to order a Level 2 Report. Fill out the details below to continue.</p>

      <div style="display:flex; flex-direction:column; gap:16px;">
        <div>
          <label class="l2-label" for="l2-name">Company Name:</label>
          <div style="position:relative;">
            <input id="l2-name" type="text" class="l2-input" placeholder="Enter company name" style="padding-right:42px;" value="{{ form.name }}" onChange="{{ onName }}">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="position:absolute; right:14px; top:50%; transform:translateY(-50%); pointer-events:none;"><path d="M3 21h18M5 21V7l7-4 7 4v14M9 9h.01M9 13h.01M9 17h.01M15 9h.01M15 13h.01M15 17h.01"></path></svg>
          </div>
        </div>
        <div>
          <label class="l2-label" for="l2-web">Company Website:</label>
          <div style="position:relative;">
            <input id="l2-web" type="url" class="l2-input" placeholder="Enter website URL" style="padding-right:42px;" value="{{ form.website }}" onChange="{{ onWebsite }}">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="position:absolute; right:14px; top:50%; transform:translateY(-50%); pointer-events:none;"><path d="M10 13a5 5 0 0 0 7.5.5l3-3a5 5 0 0 0-7-7l-1.7 1.7M14 11a5 5 0 0 0-7.5-.5l-3 3a5 5 0 0 0 7 7l1.7-1.7"></path></svg>
          </div>
        </div>
        <div>
          <label class="l2-label" for="l2-comments">Comments:</label>
          <textarea id="l2-comments" class="l2-textarea" placeholder="Enter any additional comments" value="{{ form.comments }}" onChange="{{ onComments }}"></textarea>
        </div>
      </div>

      <div style="display:flex; justify-content:center; gap:12px; margin-top:24px;">
        <button type="button" onClick="{{ close }}" class="ds-btn ds-btn--secondary ds-btn--lg" style="padding:0 24px;">Cancel</button>
        <button type="button" onClick="{{ submit }}" class="ds-btn ds-btn--primary ds-btn--lg" style="padding:0 26px;">Continue</button>
      </div>
    </div>
  </div>
  </sc-if>

  <!-- ===== Snackbar ===== -->
  <sc-if value="{{ snackOpen }}" hint-placeholder-val="{{ false }}">
  <div style="position:fixed; left:50%; top:28px; transform:translateX(-50%); z-index:120; display:flex; align-items:center; gap:12px; padding:13px 18px; background:var(--success-700); color:#fff; border-radius:var(--radius-lg); box-shadow:var(--card-shadow-raised); font-size:14px; font-weight:500; animation:l2-snack-in .26s cubic-bezier(0.16,1,0.3,1);">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;"><path d="M20 6 9 17l-5-5"></path></svg>
    Level 2 Report request submitted successfully
  </div>
  </sc-if>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = {
    open: true,
    snackOpen: false,
    form: { name: "", website: "", comments: "" },
  };

  setField(key, value) {
    this.setState(s => ({ form: { ...s.form, [key]: value } }));
  }

  submit() {
    this.setState({ open: false, snackOpen: true });
    clearTimeout(this._snackT);
    this._snackT = setTimeout(() => this.setState({ snackOpen: false }), 3600);
  }

  componentWillUnmount() {
    clearTimeout(this._snackT);
  }

  renderVals() {
    return {
      isOpen: this.state.open,
      closed: !this.state.open,
      snackOpen: this.state.snackOpen,
      userName: this.props.userName ?? "Paul",
      form: this.state.form,
      open: () => this.setState({ open: true }),
      close: () => this.setState({ open: false }),
      submit: () => this.submit(),
      onName: (e) => this.setField("name", e.target.value),
      onWebsite: (e) => this.setField("website", e.target.value),
      onComments: (e) => this.setField("comments", e.target.value),
    };
  }
}
</script>
</body>
</html>
